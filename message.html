<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message for Anisa</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Caveat:wght@400;500;600;700&family=Outfit:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <!-- HTML2Canvas Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>

    <div class="emoji-decor top-left">🌿 ✨</div>
    <div class="emoji-decor bottom-right">🍃 💎</div>
    <section class="view-section active">
        <div class="glass-container text-center"
            style="max-width: 600px; position: relative; z-index: 200; pointer-events: all;">

            <div id="envelope-section">
                <!-- <h2 class="title" style="font-size: 2.2rem; margin-bottom: 15px;">For You, Anisa... 🌿</h2>
                <p class="subtitle" style="margin-bottom: 30px;">I have something to tell you.</p> -->

                <div class="proposal-container" id="folder-container">
                    <!-- Direct Photo Display (No card container) -->
                    <div id="direct-photo-content">
                        <!-- Floating Hearts Aura -->
                        <div class="floating-elements">
                            <div class="f-heart h1">❤️</div>
                            <div class="f-heart h2">✨</div>
                            <div class="f-heart h3">❤️</div>
                            <div class="f-heart h4">✨</div>
                            <div class="f-heart h5">❤️</div>
                        </div>

                        <div class="roman-title-wrapper">
                            <span class="title-bg-word">Memory</span>
                            <h3 class="romantic-heading">A Special Moment ✨</h3>
                        </div>
                        <!-- Beautiful Framed Image Section -->
                        <div class="romantic-frame-container" id="romantic-photo-trigger">
                            <div class="romantic-image-frame">
                                <div class="romantic-frame-tape"></div>
                                <img src="assets/Our-Memory-Anisa.png" alt="Our Memory">
                            </div>
                        </div>

                        <div class="tap-hint">Tap the photo✨</div>
                    </div>

                    <!-- Folder Icon -->
                    <div class="folder-wrapper" id="folder-trigger">
                        <div class="folder-background"
                            style="background: var(--soft-tosca); position: absolute; top:0; left:0; width:100%; height:100%; border-radius: 15px; border: 1px solid var(--primary-tosca); opacity: 0.3;">
                        </div>
                        <div class="folder-icon"
                            style="background: var(--secondary-tosca); box-shadow: 0 10px 20px rgba(0, 96, 100, 0.1);">
                            <div class="folder-front" style="background: var(--primary-tosca);">Click to open</div>
                        </div>
                        <div class="proposal-label">Secret Message ✨</div>
                    </div>
                </div>
            </div>

            <!-- Layar Sukses -->
            <div id="success-screen" class="celebration-text"
                style="display: none; padding: 20px; animation: fadeIn 0.8s ease;">
                <div
                    style="font-size: 4rem; margin-bottom: 10px; filter: drop-shadow(0 10px 20px rgba(0, 151, 167, 0.3));">
                    ✨</div>
                <h2 class="title" style="font-size: 2.8rem;">I Love You!</h2>
                <p class="subtitle"
                    style="font-size: 1.1rem; color: var(--dark-tosca); margin-top: 5px; margin-bottom: 25px;">Terima
                    kasih sudah mau menjadi bagian dari hidupku. ✨</p>

                <!-- Success Main Layout -->
                <div class="success-layout"
                    style="display: flex; align-items: center; justify-content: center; gap: 30px; flex-wrap: wrap; margin-top: 20px;">

                    <!-- Left Side Controls -->
                    <div style="flex: 1; min-width: 180px; display: flex; flex-direction: column; gap: 15px; order: 1;">
                        <button id="btn-start-camera" class="btn btn-primary">🎥 Ambil Foto</button>
                        <div id="camera-controls"
                            style="display: none; width: 100%; flex-direction: column; gap: 10px;">
                            <button id="btn-capture-photo" class="btn btn-primary" style="width: 100%;">📸
                                Jepret!</button>
                            <button id="btn-retake-photo" class="btn btn-secondary" style="width: 100%;">🔄
                                Ulangi</button>
                        </div>
                    </div>

                    <!-- Center Certificate -->
                    <div style="order: 2;">
                        <!-- Dating Certificate Canvas / Notes Wrapper -->
                        <div id="certificate-wrapper"
                            style="padding: 40px 20px; background: linear-gradient(135deg, var(--soft-tosca) 0%, #ffffff 40%, #E0F2F1 100%); border-radius: 20px; max-width: 420px; position: relative; border: 1px solid rgba(255,255,255,0.5);">
                            <div id="dating-certificate"
                                style="margin: 0 auto; padding: 50px 30px; background: #ffffff; border-radius: 5px; box-shadow: 0 10px 30px rgba(0, 96, 100, 0.05); max-width: 380px; position: relative; text-align: center; border: 1px solid #E0F2F1;">
                                <!-- Washi Tape Top -->
                                <div
                                    style="position: absolute; top: -12px; left: 50%; transform: translateX(-50%) rotate(-1deg); width: 110px; height: 30px; background: rgba(128, 203, 196, 0.3); backdrop-filter: blur(2px); z-index: 10; border: 1px solid rgba(255,255,255,0.5);">
                                </div>

                                <div style="font-size: 1.5rem; margin-bottom: 20px; color: var(--accent-gold);">✨</div>

                                <h3
                                    style="font-family: 'Playfair Display', serif; color: var(--dark-tosca); font-size: 1.8rem; margin-bottom: 25px; font-weight: 600; letter-spacing: 1px;">
                                    Anamir</h3>

                                <!-- Polaroid Photo Area (Simplified) -->
                                <div
                                    style="background: white; padding: 12px 12px 35px 12px; box-shadow: 0 5px 25px rgba(0, 77, 64, 0.04); margin: 0 auto 30px auto; width: 100%; max-width: 250px; border: 1px solid #f0fdfc;">
                                    <div id="photo-container"
                                        style="width: 100%; aspect-ratio: 1/1; background: #f7fdfc; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; border-radius: 2px;">
                                        <video id="webcam-video" autoplay playsinline
                                            style="display: none; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1);"></video>
                                        <div id="flash-effect" class="camera-flash"></div>
                                        <div id="countdown-display" class="countdown-overlay" style="font-size: 4rem;">
                                        </div>
                                        <canvas id="photo-canvas" style="display: none;"></canvas>
                                        <img id="captured-photo"
                                            style="display: none; width: 100%; height: 100%; object-fit: cover;">
                                        <div id="camera-placeholder"
                                            style="color: var(--primary-tosca); font-size: 3rem;">📸</div>
                                    </div>
                                    <div
                                        style="font-family: 'Caveat', cursive; font-size: 1.5rem; color: #888; margin-top: 15px;">
                                        Captured Moment</div>
                                </div>

                                <div style="margin-bottom: 20px;">
                                    <p
                                        style="font-family: 'Outfit', sans-serif; text-transform: uppercase; letter-spacing: 2px; color: var(--primary-tosca); font-size: 0.75rem; font-weight: 700; margin-bottom: 10px;">
                                        Since the day we decided</p>
                                    <div id="cert-date"
                                        style="font-family: 'Playfair Display', serif; font-weight: 600; color: var(--dark-tosca); font-size: 1.4rem; margin-bottom: 5px;">
                                    </div>
                                    <div id="cert-date-numeric"
                                        style="font-family: 'Outfit', sans-serif; color: var(--accent-gold); font-size: 1.1rem; font-weight: 600; letter-spacing: 4px;">
                                    </div>
                                </div>

                                <div
                                    style="width: 40px; height: 2px; background: var(--primary-tosca); margin: 25px auto;">
                                </div>

                                <p
                                    style="font-family: 'Caveat', cursive; color: var(--primary-tosca); font-size: 1.4rem; font-style: italic;">
                                    "Every day is a beautiful page with you."</p>

                                <!-- Subtle Deco -->
                                <div
                                    style="position: absolute; bottom: 25px; right: 25px; font-size: 1.2rem; opacity: 0.4;">
                                    🌿</div>
                                <div
                                    style="position: absolute; top: 35px; left: 25px; font-size: 1.2rem; opacity: 0.4;">
                                    ✨</div>
                            </div>
                        </div>
                    </div>

                    <!-- Right Side Controls -->
                    <div style="flex: 1; min-width: 180px; display: flex; flex-direction: column; gap: 15px; order: 3;">
                        <button id="btn-save-cert" class="btn btn-primary" style="width: 100%; display: none;">🖨️
                            Simpan Kenangan</button>
                        <button onclick="window.location.href='home.html'" class="btn btn-secondary"
                            style="border-radius: 50px; width: 100%;">← Menu Utama</button>
                    </div>
                </div>
            </div>

        </div>
    </section>

    <script>
        const folderTrigger = document.getElementById('folder-trigger');
        const folderContainer = document.getElementById('folder-container');
        // Trigger celebration from photo click instead of button
        const photoTrigger = document.getElementById('romantic-photo-trigger');

        photoTrigger.addEventListener('click', function (e) {
            e.preventDefault();
            e.stopPropagation();

            // Efek Confetti
            let heartShape;
            try {
                // Gunakan default circle jika shapeFromPath tidak ada di versi ini
                heartShape = confetti.shapeFromPath ? confetti.shapeFromPath({ path: 'M167 473c-75-54-150-137-150-233 0-111 129-139 129-23 0 116-129 179-129 179s-129-63-129-179c0-116 129-88 129 23 0 96-75 179-150 233z' }) : 'circle';
            } catch (err) {
                heartShape = 'circle';
            }

            var duration = 5 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 1000 };

            function randomInRange(min, max) { return Math.random() * (max - min) + min; }

            var interval = setInterval(function () {
                var timeLeft = animationEnd - Date.now();
                var particleCount = 50 * (timeLeft / duration);

                confetti(Object.assign({}, defaults, {
                    particleCount,
                    origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 },
                    shapes: ['circle', 'square'],
                    colors: ['#80CBC4', '#4DB6AC', '#006064', '#C5A059', '#FFFFFF']
                }));
                confetti(Object.assign({}, defaults, {
                    particleCount,
                    origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 },
                    shapes: ['circle', 'square'],
                    colors: ['#80CBC4', '#4DB6AC', '#006064', '#C5A059', '#FFFFFF']
                }));
            }, 250);

            // Transisi ke layar sukses
            envelopeSection.style.opacity = '0';
            envelopeSection.style.transition = 'opacity 0.6s ease';

            // Set Waktu Sertifikat Saat Ini
            const now = new Date();
            const optionsDate = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const certDateNumeric = document.getElementById('cert-date-numeric');

            certDate.textContent = now.toLocaleDateString('id-ID', optionsDate);
            certDateNumeric.textContent = now.toLocaleDateString('id-ID', { day: '2-digit', month: '2-digit', year: 'numeric' }).replace(/\//g, ' . ');

            setTimeout(() => {
                envelopeSection.style.display = 'none';
                successScreen.style.display = 'block';
            }, 600);
        });

        // Buka folder
        folderTrigger.addEventListener('click', () => {
            folderContainer.classList.add('open');

            // Heart Burst on Open
            const count = 40;
            const defaults = {
                origin: { y: 0.8 },
                zIndex: 1000
            };

            function fire(particleRatio, opts) {
                confetti({
                    ...defaults,
                    ...opts,
                    particleCount: Math.floor(count * particleRatio),
                    shapes: ['heart'],
                    colors: ['#ff0000', '#FFD700', '#B8860B'] // Red and Gold
                });
            }

            fire(0.25, { spread: 26, startVelocity: 55 });
            fire(0.2, { spread: 60 });
            fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
        });

        // Simpan Sertifikat Sebagai Gambar
        btnSaveCert.addEventListener('click', () => {
            const originalTransform = certificateWrapper.style.transform;
            certificateWrapper.style.transform = 'scale(1)';

            html2canvas(certificateWrapper, {
                backgroundColor: null, // Transparent to keep gradient background
                scale: 2,
                logging: false,
                useCORS: true
            }).then(canvas => {
                certificateWrapper.style.transform = originalTransform;

                const link = document.createElement('a');
                link.download = 'Our-Memory-Anisa.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });

        // Photo Booth Logic
        const btnStartCamera = document.getElementById('btn-start-camera');
        const btnCapturePhoto = document.getElementById('btn-capture-photo');
        const btnRetakePhoto = document.getElementById('btn-retake-photo');
        const cameraControls = document.getElementById('camera-controls');

        const webcamVideo = document.getElementById('webcam-video');
        const photoCanvas = document.getElementById('photo-canvas');
        const capturedPhoto = document.getElementById('captured-photo');
        const cameraPlaceholder = document.getElementById('camera-placeholder');

        let mediaStream = null;

        // Buka Kamera
        btnStartCamera.addEventListener('click', async () => {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                webcamVideo.srcObject = mediaStream;
                webcamVideo.style.display = 'block';
                cameraPlaceholder.style.display = 'none';
                capturedPhoto.style.display = 'none';

                btnStartCamera.style.display = 'none';
                cameraControls.style.display = 'flex';
                btnSaveCert.style.display = 'none';
                btnCapturePhoto.style.display = 'block';
                btnRetakePhoto.style.display = 'none';
            } catch (err) {
                alert("Kamera tidak bisa diakses nih. Pastikan kamu sudah memberikan izin akses kamera ya! 🥺");
            }
        });

        // Ambil Foto dengan Countdown
        btnCapturePhoto.addEventListener('click', async () => {
            const countdownDisplay = document.getElementById('countdown-display');
            const flashEffect = document.getElementById('flash-effect');

            btnCapturePhoto.disabled = true;
            btnRetakePhoto.style.display = 'none';

            // Countdown 3...2...1
            for (let count = 3; count > 0; count--) {
                countdownDisplay.textContent = count;
                await new Promise(resolve => setTimeout(resolve, 800));
            }
            countdownDisplay.textContent = '❤️';
            await new Promise(resolve => setTimeout(resolve, 500));
            countdownDisplay.textContent = '';

            // Efek Flash
            flashEffect.classList.add('active');

            // Proses Capture dengan Center Crop
            const photoContainer = document.getElementById('photo-container');
            const context = photoCanvas.getContext('2d');

            // Tentukan rasio target (kotak 1:1 sesuai aspect-ratio di CSS)
            const targetWidth = 600;
            const targetHeight = 600;
            photoCanvas.width = targetWidth;
            photoCanvas.height = targetHeight;

            const videoWidth = webcamVideo.videoWidth;
            const videoHeight = webcamVideo.videoHeight;

            // Hitung dimensi untuk potong tengah (center crop) agar tidak lonjong
            let sourceX, sourceY, sourceWidth, sourceHeight;
            if (videoWidth > videoHeight) {
                sourceHeight = videoHeight;
                sourceWidth = videoHeight;
                sourceX = (videoWidth - videoHeight) / 2;
                sourceY = 0;
            } else {
                sourceWidth = videoWidth;
                sourceHeight = videoWidth;
                sourceX = 0;
                sourceY = (videoHeight - videoWidth) / 2;
            }

            context.translate(photoCanvas.width, 0);
            context.scale(-1, 1);
            context.drawImage(webcamVideo, sourceX, sourceY, sourceWidth, sourceHeight, 0, 0, targetWidth, targetHeight);

            const dataUrl = photoCanvas.toDataURL('image/png');
            capturedPhoto.src = dataUrl;

            webcamVideo.style.display = 'none';
            capturedPhoto.style.display = 'block';

            btnCapturePhoto.style.display = 'none';
            btnRetakePhoto.style.display = 'block';
            btnSaveCert.style.display = 'block';
            btnCapturePhoto.disabled = false;

            // Tunggu sebentar sebelum hilangkan flash
            await new Promise(resolve => setTimeout(resolve, 500));
            flashEffect.classList.remove('active');

            // Matikan stream kamera
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
            }
        });

        // Ulangi Foto
        btnRetakePhoto.addEventListener('click', async () => {
            btnCapturePhoto.style.display = 'block';
            btnRetakePhoto.style.display = 'none';
            btnSaveCert.style.display = 'none';

            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                webcamVideo.srcObject = mediaStream;
                webcamVideo.style.display = 'block';
                capturedPhoto.style.display = 'none';
            } catch (err) {
                alert("Kamera tidak bisa diakses nih. 🥺");
            }
        });
    </script>

    <style>
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</body>

</html>
